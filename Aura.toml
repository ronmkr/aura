# Aura: High-Performance Download Engine Configuration

[network]
# interface = "tun0"                   # Bind to a specific network interface
# local_addr = "192.168.1.100"         # Bind to a specific local IP address
listen_port = 6881                     # Port for incoming BitTorrent connections
dht_port = 6881                        # Port for DHT (UDP)
rpc_port = 6800                        # Port for JSON-RPC 2.0 server
# rpc_secret = "your_secret_here"      # Optional secret for RPC authentication
# tls_cert = "/path/to/cert.pem"        # Optional path to TLS certificate (enables HTTPS/WSS)
# tls_key = "/path/to/key.pem"          # Optional path to TLS private key
user_agent = "Aura/0.1.0"              # Custom User-Agent string
connect_timeout_secs = 30              # Socket connection timeout
tcp_keepalive_secs = 60                # TCP keepalive interval
# proxy = "socks5://127.0.0.1:9050"     # Global SOCKS5 proxy
max_redirects = 20                     # Maximum HTTP redirects to follow
http_retry_count = 5                   # Number of retries for transient HTTP errors
http_retry_delay_secs = 2              # Initial delay for exponential backoff
happy_eyeballs_stagger_ms = 250        # Delay between dual-stack connection attempts
http_buffer_capacity = 16384           # Internal HTTP download buffer size
http_concurrent_requests = 32          # Max concurrent requests per HTTP worker

[bandwidth]
global_download_limit = 0              # Global download limit in bytes/s (0 = unlimited)
global_upload_limit = 0                # Global upload limit in bytes/s
per_task_download_limit = 0            # Per-task download limit
per_task_upload_limit = 0              # Per-task upload limit
max_concurrent_downloads = 10          # Max tasks in 'Downloading' phase
max_active_tasks = 5                   # Max total tasks (Downloading + Seeding)
min_connections_per_task = 16          # Minimum connections for adaptive scaling
max_connections_per_task = 128         # Maximum connections for adaptive scaling
adaptive_scaling_low_throughput = 1024.0 # Bytes/s threshold to scale UP concurrency
adaptive_scaling_high_throughput = 1048576.0 # Bytes/s threshold to scale DOWN concurrency

[bittorrent]
enabled = true                         # Enable BitTorrent protocol
max_peers_per_torrent = 200            # Max peers to connect to per torrent
max_overall_peers = 500                # Global peer limit
request_pipeline_size = 50             # Number of simultaneous block requests per peer
dht_enabled = true                     # Enable Distributed Hash Table
pex_enabled = true                     # Enable Peer Exchange
lpd_enabled = false                    # Enable Local Peer Discovery
endgame_mode_enabled = true            # Enable parallel fetching for final blocks
endgame_threshold_pieces = 3           # Pieces left before entering endgame
endgame_threshold_percent = 0.01       # Percentage left before entering endgame
min_split_size_mb = 20                 # Minimum piece/segment size for splitting
max_connections_per_torrent = 200      # Max connections for a single swarm
peer_id_prefix = "-AR0001-"            # 8-byte prefix for client identification

[bittorrent.seeding]
min_ratio = 1.0                        # Stop when uploaded >= downloaded × ratio (0.0 = seed forever)
max_seeding_time = 0                   # Stop after N seconds (0 = seed forever)
stop_on_either = true                  # Stop when either ratio or time limit reached

[storage]
download_dir = "."                     # Default directory for finished files
cache_size_mb = 16                     # In-memory write-back cache size
preallocate = true                     # Pre-allocate disk space before starting
allocation_mode = "falloc"             # "none", "prealloc" (zeros), "falloc" (sparse)
save_session_interval_secs = 30        # Interval to sync .aura control files
read_ahead_kb = 128                    # Size of read-ahead buffer for seeding
write_buffer_kb = 256                  # Size of sequential write aggregation buffer
memory_limit_mb = 512                  # Max memory for piece buffers
memory_safety_margin_mb = 50           # Reserve memory to prevent OOM

[bulk]
max_scan_depth = 10                    # Recursion limit for folder scanning

[tui]
tick_rate_ms = 500                     # Refresh rate for the interactive TUI
rpc_url = "http://localhost:6800/jsonrpc" # Default daemon RPC endpoint for TUI

[general]
log_level = "info"                     # "trace", "debug", "info", "warn", "error"
check_integrity = true                 # Verify checksums after download
event_poll_interval_ms = 500           # Internal refresh rate for state monitors
daemon_mode = false                    # Start in background as a system service
aura_dir_name = ".aura"                # Name of the control directory in HOME
history_file_name = "history.jsonl"    # Name of the history log file

[theme]
primary = "#0000FF"
accent = "#00FFFF"
highlight = "#FFFF00"
background = "#000000"
foreground = "#FFFFFF"
success = "#00FF00"
error = "#FF0000"
warning = "#FFFF00"

[limits]
allow_duplicate_uris = false           # Allow adding tasks with duplicate URIs
max_active_tasks = 500                 # Max active tasks allowed in the engine
event_channel_capacity = 1024          # Capacity of internal event bus
command_channel_capacity = 100         # Capacity of command queues
storage_channel_capacity = 100         # Capacity of storage engine queues
history_record_limit = 100000          # Max records kept in memory
history_rotation_mb = 10.0             # Max size of history file before rotation
history_rotation_records = 10000       # Max records in history file before rotation
history_retention_records = 5000       # Number of records to keep after rotation
