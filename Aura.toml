# Aura: High-Performance Download Engine Configuration

[network]
# interface = "tun0"                   # Bind to a specific network interface
# local_addr = "192.168.1.100"         # Bind to a specific local IP address
listen_port = 6881                     # Port for incoming BitTorrent connections
dht_port = 6881                        # Port for DHT (UDP)
rpc_port = 6800                        # Port for JSON-RPC 2.0 server
# rpc_secret = "your_secret_here"      # Optional secret for RPC authentication
# tls_cert = "/path/to/cert.pem"        # Optional path to TLS certificate (enables HTTPS/WSS)
# tls_key = "/path/to/key.pem"          # Optional path to TLS private key (enables HTTPS/WSS)
user_agent = "Aura/0.1.0"              # Custom User-Agent string
connect_timeout_secs = 30              # Connection timeout for all protocols
tcp_keepalive_secs = 60                # TCP keepalive interval
# proxy = "http://127.0.0.1:8080"      # Optional global proxy
dns_resolver = "system"                # DNS resolver: "system", "cloudflare", "google", or an IP address

[bandwidth]
# All limits are in bytes per second. 0 means unlimited.
global_download_limit = 0              # Total download speed cap
global_upload_limit = 0                # Total upload speed cap
per_task_download_limit = 0            # Per-download speed cap
per_task_upload_limit = 0              # Per-download upload cap
max_concurrent_downloads = 5           # Max active downloads (queued tasks stay in 'Waiting')
max_active_tasks = 100                 # Total tasks allowed in the engine (active + paused)
min_connections_per_task = 16          # Minimum connections per individual task
max_connections_per_task = 128         # Maximum connections per individual task

[bittorrent]
enabled = true                         # Enable BitTorrent protocol
max_peers_per_torrent = 50             # Max connections per torrent
max_overall_peers = 200                # Total global peer limit
request_pipeline_size = 10             # Number of in-flight requests per peer
dht_enabled = true                     # Enable Distributed Hash Table
pex_enabled = true                     # Enable Peer Exchange
lpd_enabled = false                    # Enable Local Peer Discovery (Multicast)
[bittorrent.seeding]
min_ratio        = 1.0  # Stop when uploaded >= downloaded × ratio (0.0 = seed forever)
max_seeding_time = 0    # Stop after N seconds (0 = no time limit)
stop_on_either   = true # true = stop on EITHER condition; false = require BOTH

endgame_mode_enabled = true            # Enable parallel fetching for final blocks
min_split_size_mb = 20                 # Minimum piece/segment size for splitting

[storage]
download_dir = "."                     # Default directory for finished files
cache_size_mb = 16                     # In-memory write-back cache size
preallocate = true                     # Pre-allocate disk space before starting
allocation_mode = "falloc"             # "none", "prealloc" (zeros), "falloc" (sparse)
save_session_interval_secs = 30        # Interval to sync .aura control files
read_ahead_kb = 128                    # Size of read-ahead buffer for seeding
write_buffer_kb = 256                  # Size of sequential write aggregation buffer

[resource_mapping]
# Default policy for file name collisions: "AutoRename", "Overwrite", "Skip"
default_conflict_policy = "AutoRename"

[[resource_mapping.rules]]
# Sort videos by domain and year
condition = { Extension = "mp4" }
target = "videos/{domain}/{year}/{name}"

[hooks]
# Lifecycle hooks (ADR 0018)
# on_download_start = "sh notify_start.sh {id}"
# on_download_complete = "sh notify_done.sh {id} {path}"

[credentials]
# Credential providers (ADR 0014)
# netrc_path = "~/.netrc"
# cookie_file = "/path/to/cookies.txt"

[vpn]
# Native VPN integration (ADR 0038)
# type_name = "wireguard"              # "openvpn" or "wireguard"
# profile_path = "/etc/wireguard/wg0.conf"
# auto_connect = false                 # Attempt to trigger VPN connection on startup
# force_tunnel = true                  # Kill-switch: Refuse traffic if VPN tunnel is down

[general]
log_level = "info"                     # "trace", "debug", "info", "warn", "error"
check_integrity = true                 # Verify piece hashes during download
event_poll_interval_ms = 500           # TUI/CLI UI update frequency
daemon_mode = false                    # Start in background as a system service

[general.theme]
primary = "#0000FF"
accent = "#00FFFF"
highlight = "#FFFF00"
background = "#000000"
foreground = "#FFFFFF"
success = "#00FF00"
error = "#FF0000"
warning = "#FFFF00"

[limits]
allow_duplicate_uris = false           # Allow adding tasks with duplicate URIs
max_active_tasks = 500                 # Max active tasks allowed in the engine (for non-tenant path)
