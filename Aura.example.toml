# Aura: High-Performance Download Engine Configuration (Example)

[network]
# interface = "tun0"                   # Bind to a specific network interface
# local_addr = "192.168.1.100"         # Bind to a specific local IP address
listen_port = 6881                     # BitTorrent listen port
user_agent = "Aura/0.1.0"              # Custom User-Agent string
connect_timeout_secs = 30              # Connection timeout
tcp_keepalive_secs = 60                # TCP keepalive interval
max_redirects = 20                     # Maximum HTTP redirects
http_retry_count = 5                   # Max retries for HTTP errors
http_retry_delay_secs = 2              # Delay between retries
happy_eyeballs_stagger_ms = 250        # Happy Eyeballs stagger delay
http_buffer_capacity = 65536           # Buffer size per connection (64KB)
http_concurrent_requests = 32          # Max concurrent HTTP requests
nat_refresh_interval_secs = 1800       # Port mapping refresh interval (30 mins)

[network.dns_resolver]
# type = "system"                      # Use OS native resolver
# type = "doh", url = "https://1.1.1.1/dns-query" # DNS-over-HTTPS
# type = "dot", server = "8.8.8.8", tls_name = "dns.google" # DNS-over-TLS

[bandwidth]
global_download_limit = 0              # Unlimited
global_upload_limit = 0                # Unlimited
per_task_download_limit = 0
per_task_upload_limit = 0
refill_interval_ms = 100               # Token bucket refill rate
max_connections_per_task = 16
min_connections_per_task = 1
adaptive_scaling_low_throughput = 102400 # 10 KB/s - threshold to scale up
adaptive_scaling_high_throughput = 5242880 # 500 KB/s - threshold to scale down

[[bandwidth.schedule]]
window = "00:00-08:00"                 # Nightly speed boost
download_limit = 10485760              # 10 MB/s
upload_limit = 5242880                 # 5 MB/s

[bittorrent]
peer_id_prefix = "-AU0001-"            # Unique peer ID prefix
enable_dht = true                      # Enable Distributed Hash Table
enable_lpd = true                      # Enable Local Peer Discovery
enable_pex = true                      # Enable Peer Exchange
max_peers_per_task = 50                # Max peer connections
request_pipeline_size = 16             # Number of in-flight piece requests
handshake_timeout_secs = 10            # BitTorrent handshake timeout
dht_save_interval_secs = 300           # Interval to persist DHT nodes
dht_ping_interval_secs = 600           # Interval to refresh DHT neighbors
dht_token_rotation_secs = 600          # Interval to rotate DHT tokens
dht_query_interval_secs = 120          # Interval to query DHT for new peers
tracker_polling_interval_secs = 60     # Interval to announce to trackers
lpd_announce_interval_secs = 300       # Interval for Local Peer Discovery
choker_interval_secs = 10              # Choking algorithm tick rate
seeding_ratio_limit = 1.0              # Stop seeding at 1.0 ratio
seeding_time_limit_mins = 60           # Stop seeding after 1 hour

[storage]
download_dir = "downloads"             # Destination for files
allocation_mode = "PreAllocate"        # "PreAllocate" or "Sparse"
memory_limit_mb = 512                  # Max RAM for write aggregation
memory_safety_margin_mb = 50           # Reserve memory to prevent OOM

[bulk]
max_scan_depth = 10                    # Recursion limit for folder scanning

[notifications]
enabled = true                         # Enable native OS desktop notifications
notify_on_complete = true              # Alert when a download finishes
notify_on_error = true                 # Alert on fatal task errors
app_name = "Aura"                      # Name displayed in the notification

[tui]
tick_rate_ms = 500                     # Refresh rate for the interactive TUI
rpc_url = "http://localhost:6800/jsonrpc" # Default daemon RPC endpoint for TUI

[resource_mapping]
# Default policy for file name collisions: "AutoRename", "Overwrite", "Skip"
default_conflict_policy = "AutoRename"

[[resource_mapping.rules]]
condition = { type = "extension", value = "mp4" }
target = "videos/{name}"

[vpn]
force_tunnel = false                   # Pause all downloads if VPN drops
auto_connect = false                   # Try to reconnect VPN automatically
# type_name = "WireGuard"              # VPN protocol type
# profile_path = "/etc/wireguard/wg0.conf"

[hooks]
enabled = false                        # Enable external shell hooks

[general]
log_level = "info"                     # "trace", "debug", "info", "warn", "error"

[credentials]
# netrc_path = "~/.netrc"              # Path to netrc file
# cookie_file = "cookies.txt"          # Path to cookie file (Netscape format)

[limits]
max_active_tasks = 100                 # Architectural task ceiling
event_channel_capacity = 1024          # Internal message bus capacity
command_channel_capacity = 128         # High-priority command capacity
history_rotation_mb = 10.0             # Max size of history file before rotation
history_rotation_records = 10000       # Max records in history file before rotation
history_retention_records = 5000       # Number of records to keep after rotation
graceful_shutdown_timeout_secs = 5     # Wait time for active workers on exit

[theme]
primary = "#0000FF"
accent = "#00FFFF"
highlight = "#FFFF00"
background = "#000000"
foreground = "#FFFFFF"
success = "#00FF00"
error = "#FF0000"
warning = "#FFFF00"
