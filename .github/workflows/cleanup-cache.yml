name: Cleanup Cache

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays at midnight
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    name: Cleanup Runner Caches
    runs-on: ubuntu-latest
    steps:
      - name: Delete Stale Caches
        uses: actions/github-script@v9
        with:
          script: |
            console.log('Retrieving cache list...');
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            
            console.log(`Found ${caches.data.actions_caches.length} active caches.`);
            
            for (const cache of caches.data.actions_caches) {
              console.log(`Deleting cache key: ${cache.key} (ID: ${cache.id})`);
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              });
            }
            console.log('Cache cleanup complete.');
