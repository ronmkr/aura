name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '21 7 * * 3'

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  CODEQL_EXTRACTOR_RUST_OPTION_CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'rust' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libdbus-1-dev pkg-config

    - name: Configure Rust Toolchain
      run: |
        rustup default stable
        rustup component add rust-src rust-analyzer
        SYSROOT=$(rustc --print sysroot)
        echo "RUSTUP_TOOLCHAIN=stable" >> $GITHUB_ENV
        echo "RUST_SRC_PATH=$SYSROOT/lib/rustlib/src/rust/library" >> $GITHUB_ENV
        echo "CODEQL_EXTRACTOR_RUST_SYSROOT=$SYSROOT" >> $GITHUB_ENV
        echo "CODEQL_EXTRACTOR_RUST_SYSROOT_SRC=$SYSROOT/lib/rustlib/src/rust/library" >> $GITHUB_ENV
        echo "CODEQL_EXTRACTOR_RUST_RUSTC_SRC=$SYSROOT/lib/rustlib/src/rust/library" >> $GITHUB_ENV
        echo "CODEQL_EXTRACTOR_RUST_PROC_MACRO_SERVER=$SYSROOT/libexec/rust-analyzer-proc-macro-srv" >> $GITHUB_ENV

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "codeql-v2"

    - name: Compile Proc Macros
      run: |
        cargo check --all-targets

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: none
        config-file: ./.github/codeql/codeql-config.yml

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
