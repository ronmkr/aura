name: Security Audit

on:
  push:
    paths:
      - '**/Cargo.lock'
      - '**/Cargo.toml'
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run security audit
        uses: rustsec/audit-action@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
