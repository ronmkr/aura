name: Security Audit

on:
  push:
    paths:
      - '**/Cargo.lock'
      - '**/Cargo.toml'
  pull_request:
    paths:
      - '**/Cargo.lock'
      - '**/Cargo.toml'
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run security audit
        uses: actions-rust-lang/audit@v1
        id: audit
        continue-on-error: true
        with:
          createIssues: false

      - name: Format and Sanitize Audit Summary
        run: |
          python scripts/parse_audit.py
