name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: aura-linux-x86_64
            archive_ext: .tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: aura-macos-x86_64
            archive_ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: aura-windows-x86_64
            archive_ext: .zip
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test --release --workspace

      - name: Build Workspace
        run: cargo build --release --workspace

      - name: Package Binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package/
          cp target/release/aura package/
          cd package
          tar -czvf ../${{ matrix.artifact_name }}${{ matrix.archive_ext }} *
          cd ..

      - name: Package Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir package
          cp target/release/aura.exe package/
          Compress-Archive -Path package\* -DestinationPath ${{ matrix.artifact_name }}${{ matrix.archive_ext }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}${{ matrix.archive_ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
